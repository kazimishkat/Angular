<div class="container">
    <table class="table table-striped mt-5">
        <thead>
            <tr>
                <th>ID</th>
                <th>Name</th>
                <th>Email</th>
                <th>Cell NO</th>
                <th>Fee</th>
                <th>Action</th>

            </tr>
        </thead>
        <tbody>
            <tr *ngFor="let s of students" >
                <td>{{s.id}}</td>
                <td>{{s.name}}</td>
                <td>{{s.email}}</td>
                <td>{{s.cellNo}}</td>
                <td>{{s.fee}}</td>
                <td>
                    <button class="btn btn-danger mx-2" (click)="remove(s.id!)">Delete</button>
                <button class="btn btn-primary">Edit</button></td>
                <td></td>
                <td></td>
            </tr>
        </tbody>
    </table>
</div>
